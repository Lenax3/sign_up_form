<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="icon" href="images/favicon.png" type="image/x-icon">
    </head>
        <body>
            <div class="background">

            <div class="card">
                <img src="images/logo_nobg.png" class="logo" alt="bunny logo">

                <h1 class="signup">Sign Up</h1>

                <p class="info">Begin your journey <br> into a world of wonder.</p>

                <div class="divider text-divider">
                    <span class="line"></span>
                    <span class="star">✦</span>
                    <span class="line"></span>
                </div>

                <form action="#" method="post">

                    <div class="input-group">
                        <label for="username">
                            <img src="images/user-solid-full.svg" class="input-icon" alt="">
                            Username
                        </label>
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="username"
                                name="username"
                                placeholder="Choose a username"
                                required
                                >
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">
                            <img src="images/envelope.svg" class="input-icon" alt="">
                            Email
                        </label>
                        <div class="input-wrapper">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your email"
                                required
                                >
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <img src="images/lock-solid-full.svg" class="input-icon" alt="">
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Create a password"
                                required
                                >
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm">
                            <img src="images/lock-solid-full.svg" class="input-icon" alt="">
                            Confirm Password 
                        </label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="confirm-password"
                                name="confirm-password"
                                placeholder="Confirm your password"
                                required
                                >
                        </div>
                    </div>

                    <button class="create-btn">Create Account</button>

                </form>
            
                <p class="login">
                    Already have an account?
                    <a href="#" class="link">Log In</a>
                </p>

                <div class="divider bottom-divider">
                    <span class="line"></span>
                    <span class="star">✦</span>
                    <span class="line"></span>
                </div>

            </div>
        </div>
        </body>
</html>
